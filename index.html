<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>LIFA - Gestão de Bolsistas</title>
  <link rel="stylesheet" href="css.css">
</head>
<body>

<header>
  <h1>LIFA — Gestão de Bolsistas</h1>
  <p>Sistema de disponibilidade e alocação de bolsistas</p>
</header>

<div class="abas">
  <div class="aba ativa" onclick="trocarAba('cadastro')">Cadastro</div>
  <div class="aba"       onclick="trocarAba('bolsistas')">Bolsistas</div>
  <div class="aba"       onclick="trocarAba('escala')">Escala</div>
</div>

<div class="conteudo">

  <div id="cadastro" class="pagina ativa">
    <h2>Cadastrar Bolsista</h2>
    <label>Matrícula</label>
    <input type="text" id="matricula" placeholder="Ex: 202500101">
    <label>Nome</label>
    <input type="text" id="nome" placeholder="Ex: Ana Silva">
    <label>Email</label>
    <input type="email" id="email" placeholder="Ex: ana@gmail.com">
    <label>Linha de Pesquisa</label>
    <input type="text" id="linhaPesquisa" placeholder="Ex: Machine Learning">
    <label>Horários Livres</label>
    <input type="text" id="horariosLivres" placeholder="Ex: segunda 08:30 10:30">
    <button onclick="cadastrar()">Cadastrar</button>
    <div class="mensagem" id="msgCadastro"></div>
  </div>

  <div id="bolsistas" class="pagina">
    <h2>Bolsistas Cadastrados</h2>
    <button onclick="carregarBolsistas()">Atualizar</button>
    <table>
      <thead>
        <tr>
          <th>Matrícula</th>
          <th>Nome</th>
          <th>Email</th>
          <th>Linha de Pesquisa</th>
          <th>Horários Livres</th>
        </tr>
      </thead>
      <tbody id="tabelaBolsistas"></tbody>
    </table>
  </div>

  <div id="escala" class="pagina">
    <h2>Escala de Ocupação</h2>
    <button onclick="carregarEscala()">Atualizar</button>
    <table>
      <thead>
        <tr>
          <th>Dia</th>
          <th>Hora Início</th>
          <th>Hora Fim</th>
          <th>Bolsistas</th>
        </tr>
      </thead>
      <tbody id="tabelaEscala"></tbody>
    </table>
  </div>

</div>

<script src="/script.js"></script>
</body>
</html>
